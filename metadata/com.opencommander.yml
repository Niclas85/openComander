AutoName: OpenCommander
Summary: Local dual-pane file manager without ads or tracking
Description: |-
  OpenCommander is a free and open-source dual-pane file manager for Android.

  It is designed for local file organization without an account, ads, tracking or forced cloud sync.

  Features:
  * Dual-pane file management
  * Folder tree and file list on both sides
  * Copy or move mode
  * Multi-select
  * Drag and drop between panes
  * Delete with trash choice
  * Undo with action history
  * Browse ZIP archives like folders
  * Create ZIP archives from selected files and folders
  * Light and dark theme
  * Multilingual interface

